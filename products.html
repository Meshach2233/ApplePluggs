<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <a href="index.html">
                        <img src="./img/PLUGGS-logo.png" alt="">
                        <h3>APPLE PLUGGS <span id="empire">EMPIRE</span></h3>
                    </a>
                </div>
            
                <div class="idk">
                    <button><span><i class="fa-solid fa-shop"></i></span> SHOP NOW</button>      
                    <input type="search" id="searchInput" placeholder="What are you buying today?">
                </div>
                
                <ul class="icon">
                    <li><a href="#"><span><i class="fa-regular fa-heart"></i></span></a></li>
                    <li>
                        <a href="cart.html" id="cart-link">
                            <span><i class="fa-solid fa-cart-shopping"></i></span>
                            <span id="cart-count">Cart (0)</span>
                        </a>
                    </li>
                </ul>

                <p><a href="#"><i class="fa-regular fa-circle-user"></i></a></p>
            </nav>
        </div>
    </header>

    <section class="reveal">
    <section id="home">
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="#">COLLECTIONS</a></li>
                    <li class="current"><a href="products.html">PRODUCTS</a></li>
                    <li><a href="#">OTHER PAGES</a></li>
                    <li><a href="#">BLOG POSTS</a></li>
                </ul>

                <ul>
                    <li><a href="#">🔥 Hot Deals</a></li>
                    <li><a href="#"><i class="fa-regular fa-truck"></i> Track Your Order</a></li>
                    <li><a href="store.html"><i class="fa-solid fa-location-dot"></i> Store Location</a></li>
                </ul>
            </nav>
        </div>
    </section>
    </section>

    <section class="reveal">
    <section id="category">
        <div class="container">
            <h2><i class="fa-solid fa-layer-group"></i> Browse by Category</h2>
            <div class="category">
                <div class="category-card">
                    <img src="./img/i17.jpeg" alt="iPhones">
                    <h4>Apple</h4>
                </div>
                
                <div class="category-card">
                    <img src="./img/Samsung galaxy S25 Ultra.jpeg" alt="Samsung">
                    <h4>Samsung</h4>
                </div>

                <div class="category-card">
                    <img src="./img/mac.jpeg" alt="Macbook">
                    <h4>Macbook Pro</h4>
                </div>

                <div class="category-card">
                    <img src="./img/pixel.jpeg" alt="Pixel">
                    <h4>Google Pixel</h4>
                </div>

                <div class="category-card">
                    <img src="./img/ps51.jpeg" alt="Game">
                    <h4>PC Gaming</h4>
                </div>

                <div class="category-card">
                    <img src="./img/smartwatch.jpeg" alt="Watches">
                    <h4>S Watches</h4>
                </div>

                <div class="category-card">
                    <img src="./img/Airpod.png" alt="Airpods">
                    <h4>Airpods</h4>
                </div>
            </div>
        </div>
    </section>
    </section>

    <!-- <section class="reveal"> -->
        <section id="productsss">
            <div class="container">
                <div id="productGrid" class="product-grid">
                    <!-- Products will be injected here by JavaScript -->
                </div>
            </div>
        </section>
    </section>

    
     

    <script src="./script.js"></script>
</body>
</html>
